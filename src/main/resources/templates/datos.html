<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Datos Personales</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ef4444, #facc15, #3b82f6);
            padding: 20px;
        }

        .contenedor {
            width: 100%;
            max-width: 420px;
        }

        .tarjeta {
            background: #ffffff;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            border: 5px solid #ef4444;
            position: relative;
            animation: aparecer 0.5s ease;
        }

        /* Línea tipo Pokébola */
        .tarjeta::before {
            content: "";
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            height: 6px;
            background: black;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .titulo {
            color: #ef4444;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .saludo {
            color: #64748b;
            margin-bottom: 20px;
        }

        .info p {
            margin: 8px 0;
            font-size: 16px;
            color: #1e293b;
        }

        .info span {
            font-weight: bold;
            color: #3b82f6;
        }

        .acciones {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .boton {
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            background: linear-gradient(135deg, #3b82f6, #facc15);
            color: #1e293b;
            border: 2px solid #1e293b;
            transition: 0.3s;
        }

        .boton:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        @media (max-width: 480px) {
            .tarjeta {
                padding: 22px;
            }

            .titulo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="tarjeta">

        <h1 class="titulo">¡Hola!</h1>

        <h2 class="subtitulo">Estos son mis datos personales:</h2>

        <div class="info">
            <p>Nombre: <span th:text="${Nombre}"></span></p>
            <p>Apellido: <span th:text="${Apellido}"></span></p>
            <p>Edad: <span th:text="${Edad}"></span></p>
        </div>

        <div class="acciones">
            <a class="boton" th:href="@{/usuario}">Ir a Usuario</a>
            <a class="boton" th:href="@{/perfil}">Ir a Perfil</a>
            <a class="boton" th:href="@{/home}">Ir a Home</a>
        </div>

    </div>
</div>

</body>
</html>
